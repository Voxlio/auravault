<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Vault | Secure Premium Storage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0c;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --accent-gold: #d4af37;
            --accent-blue: #00d2ff;
            --text-main: #f0f0f0;
            --text-dim: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
            --error-red: #ff4b4b;
            --success-green: #00e676;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-deep); background: radial-gradient(circle at top right, #1a1a2e, #0a0a0c 50%); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

        #lock-screen { position: fixed; inset: 0; z-index: 1000; background: var(--bg-deep); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(20px); transition: var(--transition); }
        #lock-screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }

        .auth-card { width: 90%; max-width: 380px; padding: 30px; background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 24px; text-align: center; }
        input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 14px 16px; color: white; font-size: 16px; outline: none; margin: 20px 0; }
        .btn-premium { width: 100%; background: linear-gradient(135deg, var(--accent-blue), #0072ff); border: none; border-radius: 12px; padding: 14px; color: white; font-weight: 600; cursor: pointer; transition: var(--transition); }
        
        .app-container { max-width: 1000px; margin: 0 auto; padding: 20px; opacity: 0; display: none; }
        .app-container.visible { opacity: 1; display: block; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .vault-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .vault-card { background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; cursor: pointer; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-overlay.active { display: flex; }
        .modal-content { width: 90%; max-width: 500px; background: #151518; border-radius: 28px; padding: 32px; }
        
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 30px; background: var(--accent-blue); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 12px 24px; border-radius: 50px; opacity: 0; transition: 0.3s; z-index: 3000; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="auth-card">
            <h1 style="margin-bottom: 10px;">Aura Vault</h1>
            <p style="color: var(--text-dim); font-size: 14px;">Enter a password to create or unlock your vault</p>
            <input type="password" id="master-password" placeholder="Master Password" autofocus>
            <button class="btn-premium" id="unlock-btn">Access Vault</button>
            <p id="auth-error" style="color: var(--error-red); font-size: 13px; margin-top: 15px; display: none;">Access Denied</p>
        </div>
    </div>

    <div class="app-container" id="main-content">
        <header>
            <h2>Aura Vault</h2>
            <button id="lock-btn" style="background: none; color: white; border: 1px solid var(--glass-border); padding: 5px 15px; border-radius: 8px;">Lock</button>
        </header>
        <div class="vault-grid" id="vault-grid"></div>
    </div>

    <div class="fab" id="add-fab">+</div>

    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <h3>New Secure Entry</h3>
            <input type="text" id="entry-title" placeholder="Title">
            <textarea id="entry-content" style="width:100%; height:100px; background:black; color:white; border:1px solid #333; padding:10px; margin-bottom:10px;"></textarea>
            <button class="btn-premium" id="save-entry">Save Encrypted</button>
            <button id="cancel-add" style="background:none; color:gray; border:none; margin-top:10px; width:100%;">Cancel</button>
        </div>
    </div>

    <div id="toast" class="toast">Action completed</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCv6-R-2rvAAXOZNTkq5G1eMlUvCf0HU7w",
            authDomain: "auravault-d0300.firebaseapp.com",
            projectId: "auravault-d0300",
            storageBucket: "auravault-d0300.firebasestorage.app",
            messagingSenderId: "725634068550",
            appId: "1:725634068550:web:b2344309e66f6aa3a11a47"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let vaultKey = null;
        let currentUser = null;
        let entries = [];

        // Helper to show status
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // --- Crypto Logic ---
        async function deriveKey(password, salt) {
            const enc = new TextEncoder();
            const keyMaterial = await window.crypto.subtle.importKey("raw", enc.encode(password), {name: "PBKDF2"}, false, ["deriveKey"]);
            return window.crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: salt, iterations: 100000, hash: "SHA-256" },
                keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        }

        async function encrypt(text, key) {
            const enc = new TextEncoder();
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const ciphertext = await window.crypto.subtle.encrypt({name: "AES-GCM", iv: iv}, key, enc.encode(text));
            return { ciphertext: btoa(String.fromCharCode(...new Uint8Array(ciphertext))), iv: btoa(String.fromCharCode(...iv)) };
        }

        // --- Core App Logic ---
        async function accessVault() {
            const btn = document.getElementById('unlock-btn');
            const password = document.getElementById('master-password').value;
            if (!password) return;

            btn.disabled = true;
            btn.textContent = "Connecting...";

            try {
                // Ensure auth is ready
                if (!currentUser) {
                    await signInAnonymously(auth);
                }

                // 1. Get or Create Salt
                let storedSalt = localStorage.getItem('vault_salt');
                
                // If not in localstorage, try cloud
                if (!storedSalt && currentUser) {
                    try {
                        const saltDoc = await getDoc(doc(db, 'users', currentUser.uid, 'config', 'security'));
                        if (saltDoc.exists()) storedSalt = saltDoc.data().salt;
                    } catch (e) {
                        console.warn("Could not fetch salt from cloud (might be offline):", e);
                    }
                }

                // If still no salt, create it
                if (!storedSalt) {
                    const newSalt = window.crypto.getRandomValues(new Uint8Array(16));
                    storedSalt = btoa(String.fromCharCode(...newSalt));
                    localStorage.setItem('vault_salt', storedSalt);
                    if (currentUser) {
                        // Attempt to save to cloud, don't block if it fails due to offline
                        setDoc(doc(db, 'users', currentUser.uid, 'config', 'security'), { salt: storedSalt }).catch(err => {
                            console.error("Cloud salt save failed:", err);
                        });
                    }
                }

                const saltArr = new Uint8Array(atob(storedSalt).split("").map(c => c.charCodeAt(0)));
                vaultKey = await deriveKey(password, saltArr);

                // 2. Open UI
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('main-content').classList.add('visible');
                setupSync();
            } catch (e) {
                console.error("Access error:", e);
                document.getElementById('auth-error').style.display = 'block';
                document.getElementById('auth-error').textContent = "Connection or Auth Error. Try again.";
            } finally {
                btn.disabled = false;
                btn.textContent = "Access Vault";
            }
        }

        function setupSync() {
            if (!currentUser) return;
            const q = collection(db, 'users', currentUser.uid, 'vault');
            
            // onSnapshot works even if offline (will use cache)
            onSnapshot(q, (snapshot) => {
                entries = [];
                snapshot.forEach(doc => entries.push({ id: doc.id, ...doc.data() }));
                render();
            }, (error) => {
                console.error("Sync error:", error);
                showToast("Sync Error: " + error.message);
            });
        }

        function render() {
            const grid = document.getElementById('vault-grid');
            grid.innerHTML = entries.map(e => `
                <div class="vault-card">
                    <strong>${escapeHtml(e.title)}</strong>
                    <div style="font-size:12px; color:gray; margin-top:10px;">Encrypted Content</div>
                </div>
            `).join('');
            if (entries.length === 0) {
                grid.innerHTML = '<p style="color:gray; grid-column: 1/-1; text-align:center;">No entries yet. Tap + to add one.</p>';
            }
        }

        async function save() {
            const btn = document.getElementById('save-entry');
            const title = document.getElementById('entry-title').value;
            const content = document.getElementById('entry-content').value;
            
            if (!title || !content) return;
            
            btn.disabled = true;
            btn.textContent = "Encrypting...";

            try {
                const encrypted = await encrypt(content, vaultKey);
                
                // Save to Firestore (works offline by default, will sync later)
                await setDoc(doc(db, 'users', currentUser.uid, 'vault', Date.now().toString()), {
                    title, 
                    content: encrypted, 
                    updated: Date.now()
                });
                
                document.getElementById('add-modal').classList.remove('active');
                document.getElementById('entry-title').value = '';
                document.getElementById('entry-content').value = '';
                showToast("Saved Locally & Syncing...");
            } catch (e) {
                console.error("Save error:", e);
                showToast("Error saving entry");
            } finally {
                btn.disabled = false;
                btn.textContent = "Save Encrypted";
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // --- Init ---
        onAuthStateChanged(auth, user => {
            currentUser = user;
            if (user) {
                console.log("Authenticated as:", user.uid);
            }
        });

        // Initialize Firebase Auth
        signInAnonymously(auth).catch(err => {
            console.error("Initial sign-in failed:", err);
            showToast("Failed to connect to Firebase.");
        });

        document.getElementById('unlock-btn').onclick = accessVault;
        document.getElementById('add-fab').onclick = () => document.getElementById('add-modal').classList.add('active');
        document.getElementById('save-entry').onclick = save;
        document.getElementById('cancel-add').onclick = () => {
            document.getElementById('add-modal').classList.remove('active');
        };
        document.getElementById('lock-btn').onclick = () => location.reload();
    </script>
</body>
</html>
